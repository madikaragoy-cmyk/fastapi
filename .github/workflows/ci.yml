name: FastAPI CI

on:
  push:
    branches: [ main ]

jobs:
  bulid:
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v3

      - name: Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      
      - name: Устанавливаем Зависимости
        run: | 
          pip install requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: bulid
    speps:
      
      - name: Запускаем Тесты
        run: | 
          pytest

deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v3

      - name: Создаем папку deploy
        run: mkdir deploy

      - name: Копируем проект в deploy
        run: |
          cp -r app deploy/ || true
          cp requirements.txt deploy/ || true
          cp main.py deploy/ || true

      - name: Проверяем содержимое папки
        run: ls -R deploy
    